[package]
name = "watercontroller-core"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Platform-independent logic for the doremorwater controller"

[dependencies]
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# `chrono` with std + alloc + serde (no `clock` feature — time always comes
# through the Clock trait, never directly from the OS).
chrono = { version = "0.4", default-features = false, features = ["alloc", "std", "serde"] }
# Bounded queues / ring buffers without alloc explosion.
heapless = "0.8"

[dev-dependencies]
serde_json = { workspace = true }
