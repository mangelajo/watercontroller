name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    name: core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
      - name: cargo test -p watercontroller-core
        run: cargo test --lib -p watercontroller-core --verbose
      - name: cargo build -p watercontroller-host
        run: cargo build -p watercontroller-host --verbose
      - name: cargo fmt --check
        run: cargo fmt --check -p watercontroller-core -p watercontroller-host
        continue-on-error: true
      - name: cargo clippy
        run: cargo clippy -p watercontroller-core -p watercontroller-host -- -D warnings
        continue-on-error: true

  firmware-build:
    name: firmware container build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo registries (host side of the container build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/watercontroller-cargo/registry
            ~/.cache/watercontroller-cargo/git
          key: cargo-firmware-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-firmware-
      - name: Pull idf-rust container
        run: docker pull docker.io/espressif/idf-rust:esp32_latest
      - name: Build firmware (debug)
        run: |
          # Replace podman with docker on hosted runners.
          sed -i 's/podman /docker /g' scripts/firmware.sh
          # Hosted runners don't have rootless uid 1000 mapping by default;
          # drop the --userns=keep-id flag so docker runs the container's
          # default uid (1000) and writes to bind-mounted paths owned by it.
          sed -i 's| --userns=keep-id:uid=1000,gid=1000||' scripts/firmware.sh
          # Pre-create the cache dirs the script expects.
          mkdir -p ~/.cache/watercontroller-cargo/registry ~/.cache/watercontroller-cargo/git ~/.cache/watercontroller-espressif
          sudo chown -R 1000:1000 ~/.cache/watercontroller-cargo ~/.cache/watercontroller-espressif "$GITHUB_WORKSPACE"
          ./scripts/firmware.sh build
